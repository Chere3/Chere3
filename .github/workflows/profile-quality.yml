name: Profile Quality

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 14 * * 1'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            ROADMAP.md
            PORTFOLIO_STANDARDS.md

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            README.md ROADMAP.md PORTFOLIO_STANDARDS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
